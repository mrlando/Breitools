<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Monika's breitools</title>
<link rel="stylesheet" href="style.css">
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#c1694f">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<link rel="icon" href="favicon-32.png" sizes="32x32">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<script src="version-check.js"></script>
</head>
<body>
  <div class="header">
    <div class="icon">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="8" cy="8" r="5"/>
        <circle cx="16" cy="16" r="5"/>
        <path d="M8 3 Q 11 8 8 13"/>
        <path d="M16 11 Q 19 16 16 21"/>
      </svg>
    </div>
    <h1>Monika's breitools</h1>
    <p class="sub">Kies een rekentool</p>
  </div>

  <ul class="tool-list">
    <li>
      <a class="tool-card glass" href="switchgewicht.html">
        <span class="tool-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
            <path d="M12 3v18"/>
            <path d="m19 8 3 8a5 5 0 0 1-6 0zV7"/>
            <path d="M3 7h1a17 17 0 0 0 8-2 17 17 0 0 0 8 2h1"/>
            <path d="m5 8 3 8a5 5 0 0 1-6 0zV7"/>
            <path d="M7 21h10"/>
          </svg>
        </span>
        <span class="tool-text">
          <div class="tool-name">Switchgewicht</div>
          <div class="tool-desc">Sophie Shawl: increase → decrease</div>
        </span>
        <span class="tool-arrow">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 6l6 6-6 6"/></svg>
        </span>
      </a>
    </li>
    <li>
      <a class="tool-card glass" href="garenschatting.html">
        <span class="tool-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
            <path d="M11 21.73a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73z"/>
            <path d="M12 22V12"/>
            <polyline points="3.29 7 12 12 20.71 7"/>
            <path d="m7.5 4.27 9 5.15"/>
          </svg>
        </span>
        <span class="tool-text">
          <div class="tool-name">Garenschatting</div>
          <div class="tool-desc">Hoeveel meter/gram heb je nodig?</div>
        </span>
        <span class="tool-arrow">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 6l6 6-6 6"/></svg>
        </span>
      </a>
    </li>
    <li>
      <a class="tool-card glass" href="sokkentool.html">
        <span class="tool-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
            <path d="M6.5 3h6a1.5 1.5 0 0 1 1.5 1.5v6.4c0 1.2.4 2.4 1.2 3.3l3 3.6a2.3 2.3 0 0 1-1.8 3.8H7a2.5 2.5 0 0 1-2.5-2.5V5.5A2.5 2.5 0 0 1 6.5 3Z"/>
            <path d="M5 8h9"/>
          </svg>
        </span>
        <span class="tool-text">
          <div class="tool-name">Sokkenpatroon</div>
          <div class="tool-desc">Volledig recept: cuff tot toe (German short row heel)</div>
        </span>
        <span class="tool-arrow">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 6l6 6-6 6"/></svg>
        </span>
      </a>
    </li>
  </ul>

  <p class="build-version">v<span id="buildVersion">22</span></p>
</body>
</html>
